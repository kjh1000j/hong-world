<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>재홍 원사의 군생활 위기 극복 - Standalone</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { background-color: var(--bg-color); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background-color: #111; box-shadow: 0 0 50px rgba(0,0,0,0.5); display: block; }
        
        /* UI Layers */
        .ui-layer { position: absolute; pointer-events: none; width: 100%; height: 100%; max-width: 56.25vh; }
        .hud { 
            top: 0; 
            left: 0; 
            padding: 0; 
            padding-top: env(safe-area-inset-top, 45px);
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            z-index: 10; 
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
        }
        .hud-inner {
            width: 100%;
            max-width: 56.25vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .score-box { font-family: monospace; background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 12px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .score { font-size: 24px; font-weight: bold; }
        .level { font-size: 12px; color: #888; }
        .hearts { display: flex; gap: 5px; margin-bottom: 5px; }
        .heart { color: #ff3b3b; width: 20px; height: 20px; }
        .heart.lost { color: #333; }
        
        .controls-hud { pointer-events: auto; display: flex; gap: 10px; }
        .btn-icon { background: rgba(50,50,50,0.8); border: 1px solid #444; border-radius: 12px; padding: 10px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* Screens */
        .screen { position: absolute; inset: 0; background: var(--panel-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 30px; z-index: 100; pointer-events: auto; backdrop-filter: blur(10px); overflow-y: auto; }
        .screen-inner { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; margin: auto; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 10px; line-height: 1.2; }
        .highlight { color: #eab308; font-style: italic; }
        p { color: #aaa; margin-bottom: 30px; line-height: 1.5; font-size: 14px; }
        
        .btn-primary { background: #eab308; color: #000; font-weight: 900; padding: 18px 40px; border-radius: 20px; border: none; font-size: 18px; cursor: pointer; transition: transform 0.1s; width: 100%; max-width: 240px; box-shadow: 0 10px 20px rgba(234,179,8,0.2); }
        .btn-primary:active { transform: scale(0.95); }
        
        .btn-secondary { background: white; color: #000; font-weight: 700; padding: 15px 30px; border-radius: 15px; border: none; margin-top: 10px; cursor: pointer; text-decoration: none; display: inline-block; }

        .guide-grid { display: grid; grid-cols: 2; gap: 10px; margin-bottom: 30px; width: 100%; max-width: 300px; }
        .guide-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: left; }
        .guide-item.enemy { border-color: rgba(255,0,0,0.3); }
        .guide-item.obs { border-color: rgba(180,0,255,0.3); }
        .badge { font-size: 10px; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        .bg-red { background: #ef4444; }
        .bg-purple { background: #a855f7; }
        
        #boss-notice { position: absolute; top: 100px; width: 100%; text-align: center; color: #ff3b3b; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; animation: blink 0.5s infinite; visibility: hidden; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        .control-bar { position: absolute; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.5); border-top: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .track { width: 80%; height: 6px; background: #222; border-radius: 10px; position: relative; }
        .knob { position: absolute; top: -7px; width: 20px; height: 20px; background: #eab308; border-radius: 50%; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px #eab308; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="hud" class="ui-layer hud" style="display:none;">
        <div class="hud-inner">
            <div class="score-box">
                <div id="hearts-container" class="hearts"></div>
                <div id="score-display" class="score">0</div>
                <div id="level-display" class="level">LV.1.0</div>
            </div>
            <div class="controls-hud">
                <div id="mute-btn" class="btn-icon"><i data-lucide="volume-2"></i></div>
                <div id="reset-btn" class="btn-icon"><i data-lucide="rotate-ccw"></i></div>
            </div>
        </div>
    </div>

    <div id="boss-notice">⚠️ BOSS INCOMING ⚠️</div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <div class="screen-inner">
            <h1>재홍 원사의<br><span class="highlight">군생활 위기 극복</span></h1>
            <p>법전과 규정집을 날려 악성 민원과 갑질을 물리치고<br>군생활의 평화를 되찾으세요!</p>
            
            <div class="guide-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="guide-item enemy">
                    <div style="font-size: 24px;">👹 <span class="badge bg-red">Attack</span></div>
                    <div style="font-size: 11px; color:#ff8888; margin-top:5px;">공격해서 파괴 가능!</div>
                </div>
                <div class="guide-item obs">
                    <div style="font-size: 24px;">⚠️ <span class="badge bg-purple">Avoid</span></div>
                    <div style="font-size: 11px; color:#bb88ff; margin-top:5px;">무조건 피하세요!</div>
                </div>
                <div class="guide-item item" style="grid-column: span 2; border-color: rgba(0,255,100,0.3); background: rgba(0,255,100,0.05);">
                    <div style="font-size: 24px;">✨ <span class="badge" style="background:#22c55e;">Item</span></div>
                    <div style="font-size: 11px; color:#bcffce; margin-top:5px;">상여금(무적), 가족(회복)</div>
                </div>
            </div>
    
            <button id="start-btn" class="btn-primary">작전 개시</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen" style="display:none; background: rgba(50,0,0,0.95);">
        <h1 style="color:#ff3b3b;">MISSION FAILED</h1>
        <p>위기는 기회다! 다시 한 번 힘을 내세요.</p>
        <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:20px; margin-bottom:30px; width:100%; max-width:200px;">
            <div style="font-size:10px; color:#ff8888; text-transform:uppercase; margin-bottom:5px;">최종 공헌도</div>
            <div id="final-score" style="font-size:32px; font-weight:bold; font-family:monospace;">0</div>
        </div>
        <button id="retry-btn" class="btn-primary" style="background:white; color:red;">재도전</button>
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="screen" style="display:none; background: #eab308;">
        <div style="background:white; padding:20px; border-radius:50%; margin-bottom:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <i data-lucide="trophy" style="width:60px; height:60px; color:#eab308;"></i>
        </div>
        <h1 style="color:#000;">🎉 위기 극복 완료! 🎉</h1>
        <p style="color:#333; font-weight:bold;">재홍 원사는 군생활의 모든 위기를<br>슬기롭게 극복하였습니다!</p>
        <a href="https://github.com/kjh1000j/hong-world/blob/main/index.html" target="_blank" class="btn-primary" style="background:#000; color:white; margin-bottom:10px; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px;">
            <i data-lucide="home" style="width:18px;"></i> '홍의 세계' 가기
        </a>
        <button id="restart-btn" class="btn-secondary">처음으로</button>
    </div>

    <div id="control-bar" class="ui-layer control-bar" style="display:none;">
        <div class="track">
            <div id="knob" class="knob"></div>
        </div>
    </div>
</div>

<script>
    // --- Setup & Constants ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const controlBar = document.getElementById('control-bar');
    const knob = document.getElementById('knob');
    
    let width, height;
    const ASPECT_RATIO = 9 / 16;
    const PLAYER_SIZE = 50;
    
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        let cW = width;
        let cH = width / ASPECT_RATIO;
        
        if (cH > height) {
            cH = height;
            cW = height * ASPECT_RATIO;
        }
        
        canvas.width = cW;
        canvas.height = cH;
        
        // Update UI scale
        document.querySelectorAll('.ui-layer').forEach(el => {
            el.style.width = cW + 'px';
            el.style.height = cH + 'px';
        });
    }
    
    window.addEventListener('resize', resize);
    resize();
    lucide.createIcons();

    // --- Audio System ---
    let audioCtx = null;
    let isMuted = false;

    function playSfx(type) {
        if (isMuted) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'shoot') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(110, now + 0.1);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.exponentialRampToValueAtTime(55, now + 0.2);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'damage') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(110, now);
            osc.frequency.linearRampToValueAtTime(55, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'item') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523, now);
            osc.frequency.exponentialRampToValueAtTime(1046, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        }
    }

    // --- Game Logic ---
    let gameState = 'START';
    let score = 0;
    let difficulty = 1;
    let frameCount = 0;
    let lastShot = 0;

    let player = { x: 0, y: 0, size: PLAYER_SIZE, hp: 3, targetX: 0, invincible: 0, aura: 0, dash: 0 };
    let enemies = [];
    let obstacles = [];
    let projectiles = [];
    let items = [];
    let boss = null;
    let scrollOffset = 0;

    function reset() {
        score = 0;
        difficulty = 1;
        frameCount = 0;
        player = { 
            x: canvas.width / 2, 
            y: canvas.height - 140, 
            size: PLAYER_SIZE, 
            hp: 3, 
            targetX: canvas.width / 2, 
            invincible: 0, 
            aura: 0, 
            dash: 0 
        };
        enemies = [];
        obstacles = [];
        projectiles = [];
        items = [];
        boss = null;
        updateHud();
        document.getElementById('boss-notice').style.visibility = 'hidden';
    }

    function spawnEnemy() {
        const type = Math.random();
        const common = {
            id: Date.now(),
            x: Math.random() * (canvas.width - 60) + 30,
            y: -50,
            size: 45,
            speed: (2 + Math.random() * 2) * difficulty,
            category: 'enemy'
        };
        if (type < 0.25) enemies.push({...common, emoji:'📞', label:'잦은 호출', hp:2});
        else if (type < 0.5) enemies.push({...common, emoji:'😤', label:'인사 갑질', hp:3});
        else if (type < 0.75) enemies.push({...common, emoji:'🔍', label:'감찰 조사', hp:2});
        else enemies.push({...common, emoji:'💢', label:'악성 민원', hp:4});
    }

    function spawnObstacle() {
        const type = Math.random();
        const common = {
            id: Date.now(),
            x: Math.random() * (canvas.width - 60) + 30,
            y: -50,
            size: 55,
            speed: 4 * difficulty,
            category: 'obstacle'
        };
        if (type < 0.25) obstacles.push({...common, emoji:'👴', label:'나 때는 말야', speed:3*difficulty});
        else if (type < 0.5) obstacles.push({...common, emoji:'🚘', label:'전관예우', speed:6*difficulty});
        else if (type < 0.75) obstacles.push({...common, emoji:'❓', label:'원칙 없는 지시', speed:4*difficulty});
        else obstacles.push({...common, emoji:'🤝', label:'듣보잡 인맥', speed:5*difficulty});
    }

    function spawnItem() {
        const type = Math.random();
        items.push({
            id: Date.now(),
            x: Math.random() * (canvas.width - 60) + 30,
            y: -50,
            size: 40,
            speed: 3,
            category: 'item',
            type: type < 0.5 ? 'Bonus' : 'Family',
            emoji: type < 0.5 ? '💰' : '🖼️',
            label: type < 0.5 ? '성과상여금!' : '가족 응원!'
        });
    }

    function fire() {
        const now = Date.now();
        if (now - lastShot < 180) return;
        lastShot = now;
        playSfx('shoot');
        const isBook = Math.random() > 0.5;
        projectiles.push({
            x: player.x,
            y: player.y - 30,
            size: 25,
            emoji: isBook ? '📖' : '📜',
            label: isBook ? '법령' : '법규',
            speed: 12
        });
    }

    function updateHud() {
        document.getElementById('score-display').innerText = Math.floor(score).toLocaleString();
        document.getElementById('level-display').innerText = 'LV.' + difficulty.toFixed(1);
        
        let heartsHtml = '';
        for (let i = 0; i < 3; i++) {
            heartsHtml += `<i data-lucide="heart" class="heart ${i >= player.hp ? 'lost' : ''}"></i>`;
        }
        document.getElementById('hearts-container').innerHTML = heartsHtml;
        lucide.createIcons();
    }

    // --- Input Handling ---
    function handleInput(clientX) {
        if (gameState !== 'PLAYING' && gameState !== 'BOSS') return;
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        let x = (clientX - rect.left) * scale;
        player.targetX = Math.max(PLAYER_SIZE/2, Math.min(canvas.width - PLAYER_SIZE/2, x));
        
        // Update knob visual
        knob.style.left = (player.targetX / canvas.width) * 100 + '%';
    }

    canvas.addEventListener('mousemove', e => handleInput(e.clientX));
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        handleInput(e.touches[0].clientX);
    }, {passive: false});
    canvas.addEventListener('mousedown', e => handleInput(e.clientX));
    canvas.addEventListener('touchstart', e => {
        handleInput(e.touches[0].clientX);
    }, {passive: false});

    // --- Drawing ---
    function drawRank(ctx, x, y) {
        ctx.save();
        ctx.translate(x, y - 35);
        ctx.scale(0.8, 0.8);
        const gold = '#FFD700';
        
        // Star
        ctx.fillStyle = gold;
        ctx.font = '24px serif';
        ctx.textAlign = 'center';
        ctx.fillText('★', 0, -25);
        
        // 3 Chevrons
        ctx.strokeStyle = gold;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        for (let i = 0; i < 3; i++) {
            const offset = i * 8;
            ctx.beginPath();
            ctx.moveTo(-15, -10 + offset);
            ctx.lineTo(0, 0 + offset);
            ctx.lineTo(15, -10 + offset);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawEntity(ctx, e) {
        ctx.save();

        const bounce = Math.sin(Date.now() * 0.005) * 5;
        const rotation = (Date.now() * 0.001) % (Math.PI * 2);

        let plateColor = 'rgba(255,255,255,0.2)';
        let shadowColor = 'white';
        let borderColor = 'white';

        if (e.category === 'enemy') { 
            plateColor = 'rgba(255, 0, 0, 0.9)'; 
            shadowColor = '#ff0000'; 
            borderColor = '#ffcccc'; 
        }
        else if (e.category === 'obstacle') { 
            plateColor = 'rgba(147, 51, 234, 0.95)'; 
            shadowColor = '#d8b4fe'; 
            borderColor = '#f3e8ff'; 
        }
        else if (e.category === 'item') { 
            plateColor = 'rgba(250, 204, 21, 0.9)'; 
            shadowColor = '#fef08a'; 
            borderColor = '#fefce8'; 
        }

        // Plate Glow
        ctx.shadowBlur = 25;
        ctx.shadowColor = shadowColor;

        // Rotating Outer Ring
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(e.x, e.y + bounce, e.size * 0.82, rotation, rotation + Math.PI * 1.5);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = plateColor;
        ctx.beginPath();
        ctx.arc(e.x, e.y + bounce, e.size * 0.65, 0, Math.PI * 2);
        ctx.fill();

        // Emoji contrast backing
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.beginPath();
        ctx.arc(e.x, e.y + bounce - 5, e.size * 0.45, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 4;
        ctx.stroke();

        // Emoji
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.font = 'bold ' + (e.size * 0.8) + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'black';
        ctx.fillText(e.emoji, e.x, e.y + bounce - 5);
        ctx.restore();

        // Label (High Contrast Bold)
        ctx.save();
        ctx.fillStyle = 'white';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 5;
        ctx.font = '900 17px sans-serif';
        ctx.textAlign = 'center';
        ctx.strokeText(e.label, e.x, e.y + bounce + 33);
        ctx.fillText(e.label, e.x, e.y + bounce + 33);
        ctx.restore();
    }

    function loop() {
        if (gameState !== 'PLAYING' && gameState !== 'BOSS') {
            requestAnimationFrame(loop);
            return;
        }

        ctx.clearRect(0,0, canvas.width, canvas.height);
        frameCount++;
        difficulty = 1 + (frameCount / 5000);

        // Auto Fire
        fire();

        // BG: Clean Military Base Ground
        ctx.fillStyle = '#4b533a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Course Lanes
        ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 2;
        scrollOffset = (scrollOffset + (2 * difficulty));
        for (let x = 0; x <= canvas.width; x += canvas.width / 3) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        
        // Treads
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let i = 0; i < 8; i++) {
            const y = (scrollOffset * 1.2 + (i * 150)) % (canvas.height + 100) - 50;
            ctx.fillRect(40, y, 20, 10); ctx.fillRect(canvas.width - 60, y, 20, 10);
        }

        // Base Structures
        function drawBaseDecor(yPos, xSeed) {
            const x = 30 + (xSeed * (canvas.width - 100));
            const type = Math.floor(xSeed * 10) % 3;
            ctx.save(); ctx.globalAlpha = 0.4;
            if (type === 0) { ctx.fillStyle = '#2d3321'; ctx.fillRect(x, yPos, 60, 40); }
            else if (type === 1) { ctx.fillStyle = '#6b705c'; for(let j=0; j<3; j++) ctx.fillRect(x + (j*5), yPos + (j*8), 30, 10); }
            else { ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(x, yPos, 40, 40); }
            ctx.restore();
        }
        for (let i = 0; i < 3; i++) {
            const y = (scrollOffset + (i * 400)) % (canvas.height + 400) - 200;
            drawBaseDecor(y, i * 0.881 + 0.1);
        }

        // Player Update
        player.x += (player.targetX - player.x) * 0.15;
        if (player.invincible > 0) player.invincible--;
        if (player.aura > 1) player.aura--;
        if (player.dash > 1) player.dash--;

        // Spawning
        const spawnRate = Math.max(25, 60 - Math.floor(difficulty * 5));
        if (frameCount % spawnRate === 0) spawnEnemy();
        if (frameCount % 100 === 0) spawnObstacle();
        if (frameCount % 600 === 0) spawnItem();

        if (score >= 5000 && !boss) {
            boss = { x: canvas.width/2, y: -100, size: 100, hp: 200, maxHp: 200, attackTimer: 0, emoji: '🧛‍♀️', category: 'boss' };
            gameState = 'BOSS';
            document.getElementById('boss-notice').style.visibility = 'visible';
            setTimeout(() => { document.getElementById('boss-notice').style.visibility = 'hidden'; }, 3000);
        }

        // Projectiles
        projectiles.forEach((p, i) => {
            p.y -= p.speed;
            ctx.save();
            // High contrast projectile glow
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#4ade80';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = 'bold ' + p.size + 'px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 0;
            ctx.fillText(p.emoji, p.x, p.y);

            // Projectile Label
            ctx.font = 'bold 10px sans-serif';
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.strokeText(p.label || '', p.x, p.y + 18);
            ctx.fillText(p.label || '', p.x, p.y + 18);
            ctx.restore();
            if (p.y < -50) projectiles.splice(i, 1);
        });

        // Enemies
        enemies.forEach((e, i) => {
            e.y += e.speed;
            drawEntity(ctx, e);
            
            // Collision with projectile
            projectiles.forEach((p, pi) => {
                if (Math.hypot(e.x - p.x, e.y - p.y) < e.size/2 + p.size/2) {
                    e.hp--;
                    projectiles.splice(pi, 1);
                    playSfx('hit');
                    if (e.hp <= 0) { enemies.splice(i, 1); score += 150; updateHud(); }
                }
            });

            // Collision with player
            if (player.invincible === 0 && Math.hypot(e.x - player.x, e.y - player.y) < e.size/2 + player.size/2) {
                if (player.dash > 0) { enemies.splice(i, 1); score += 200; updateHud(); playSfx('hit'); }
                else { player.hp--; player.invincible = 60; playSfx('damage'); updateHud(); }
            }
            if (e.y > canvas.height + 50) enemies.splice(i, 1);
        });

        // Obstacles
        obstacles.forEach((o, i) => {
            o.y += o.speed;
            drawEntity(ctx, o);
            if (player.invincible === 0 && Math.hypot(o.x - player.x, o.y - player.y) < o.size/2 + player.size/2) {
                player.hp--; player.invincible = 60; playSfx('damage'); updateHud();
            }
            if (o.y > canvas.height + 50) obstacles.splice(i, 1);
        });

        // Items
        items.forEach((it, i) => {
            it.y += it.speed;
            drawEntity(ctx, it);
            if (Math.hypot(it.x - player.x, it.y - player.y) < it.size/2 + player.size/2) {
                playSfx('item');
                if (it.type === 'Bonus') { player.dash = 300; player.invincible = 300; }
                else { player.aura = 300; player.invincible = 300; player.hp = Math.min(3, player.hp + 1); }
                items.splice(i, 1);
                score += 500;
                updateHud();
            }
            if (it.y > canvas.height + 50) items.splice(i, 1);
        });

        // Boss
        if (boss) {
            if (boss.y < 200) boss.y += 2;
            else {
                boss.x = (canvas.width/2) + Math.sin(frameCount * 0.02) * (canvas.width/3);
                boss.attackTimer++;
                if (boss.attackTimer > (50 / difficulty)) {
                    boss.attackTimer = 0;
                    const type = Math.random();
                    if (type < 0.33) obstacles.push({ id:Date.now(), x: boss.x, y: boss.y, size:60, speed:6*difficulty, emoji:'✂️', label:'진급 누락!!', category:'obstacle'});
                    else if (type < 0.66) obstacles.push({ id:Date.now(), x: boss.x, y: boss.y, size:65, speed:8*difficulty, emoji:'⛓️', label:'강제 교류!!', category:'obstacle'});
                    else {
                        for(let k=-1; k<=1; k++) {
                            obstacles.push({ id:Date.now()+k, x: boss.x + k*90, y: boss.y + Math.abs(k)*30, size:55, speed:5*difficulty, emoji:'❌', label:'히스테리!!', category:'obstacle'});
                        }
                    }
                }
            }

            projectiles.forEach((p, pi) => {
                if (Math.hypot(boss.x - p.x, boss.y - p.y) < boss.size/2 + p.size/2) {
                    boss.hp -= 1;
                    projectiles.splice(pi, 1);
                    playSfx('hit');
                    if (boss.hp <= 0) { gameState = 'ENDING'; showScreen('win-screen'); }
                }
            });

            // Draw Boss
            const pulse = Math.sin(Date.now() * 0.01) * 20;
            ctx.save();
            ctx.shadowBlur = 40 + pulse;
            ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = 'rgba(139, 92, 246, 0.3)';
            ctx.beginPath();
            ctx.arc(boss.x, boss.y, boss.size * 0.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.save();
            // Solid backing for Boss Emoji
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'white';
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(boss.x, boss.y, boss.size * 0.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 20;
            ctx.shadowColor = 'black';
            ctx.font = 'bold ' + boss.size + 'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(boss.emoji, boss.x, boss.y);
            ctx.restore();
            
            ctx.fillStyle='#ff7777'; ctx.strokeStyle='black'; ctx.lineWidth=4; ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
            ctx.strokeText('😈 열등감 가득한 인사 마녀 😈', boss.x, boss.y + boss.size/2 + 35);
            ctx.fillText('😈 열등감 가득한 인사 마녀 😈', boss.x, boss.y + boss.size/2 + 35);
            
            const barW = canvas.width - 40;
            const barX = canvas.width / 2;
            const barY = 120; // Pushed down for HUD clearance
            ctx.fillStyle = '#111'; ctx.fillRect(barX - barW/2, barY, barW, 20);
            ctx.fillStyle = '#ff0000'; ctx.fillRect(barX - barW/2 + 2, barY + 2, (barW - 4) * (boss.hp / boss.maxHp), 16);
            ctx.fillStyle = 'white'; ctx.font = 'bold 10px sans-serif'; ctx.fillText('마녀 체력', barX, barY + 14);
        }

        // Player Draw
        if (player.aura > 0) {
            ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = 'gold'; ctx.beginPath(); ctx.arc(player.x, player.y, player.size * 0.8, 0, Math.PI*2);
            ctx.fillStyle='rgba(255,215,0,0.3)'; ctx.fill(); ctx.restore();
        }
        if (!(player.invincible > 0 && Math.floor(player.invincible/5)%2===0)) {
            ctx.fillStyle = player.dash > 0 ? 'gold' : '#343';
            ctx.beginPath(); ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle='white'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText('재홍', player.x, player.y + 4);
            drawRank(ctx, player.x, player.y);
        }

        if (player.hp <= 0) { gameState = 'GAME_OVER'; showScreen('game-over-screen'); document.getElementById('final-score').innerText = Math.floor(score).toLocaleString(); }

        requestAnimationFrame(loop);
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(screenId).style.display = 'flex';
        hud.style.display = screenId === 'none' ? 'flex' : 'none';
        controlBar.style.display = screenId === 'none' ? 'flex' : 'none';
    }

    document.getElementById('start-btn').onclick = () => { reset(); gameState = 'PLAYING'; showScreen('none'); hud.style.display = 'flex'; controlBar.style.display = 'flex'; };
    document.getElementById('retry-btn').onclick = () => { gameState = 'START'; showScreen('start-screen'); };
    document.getElementById('restart-btn').onclick = () => { gameState = 'START'; showScreen('start-screen'); };
    document.getElementById('reset-btn').onclick = () => { gameState = 'START'; showScreen('start-screen'); };
    document.getElementById('mute-btn').onclick = function() {
        isMuted = !isMuted;
        this.innerHTML = isMuted ? '<i data-lucide="volume-x"></i>' : '<i data-lucide="volume-2"></i>';
        lucide.createIcons();
    };

    loop();
</script>
</body>
</html>
