<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>재홍 원사의 군생활 위기 극복</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        body { background:#0a0a0a; overflow:hidden; touch-action:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
        #gc { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
        canvas { display:block; }

        /* ── 상단 HUD: 한 줄 얇은 바 ── */
        #hud {
            display: none;
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            pointer-events: none;
            flex-direction: row;
            align-items: center;
            gap: 0;
            height: 36px;
            background: rgba(0,0,0,0.75);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            padding: 0 10px;
            white-space: nowrap;
        }
        /* HUD 너비를 canvas에 맞춤 – JS로 세팅 */
        .hud-hearts { display:flex; gap:3px; align-items:center; }
        .h { font-size:14px; line-height:1; }
        .h.lost { opacity:0.2; filter:grayscale(1); }
        .hud-sep { width:1px; height:18px; background:rgba(255,255,255,0.15); margin:0 8px; }
        #score-display { font-size:13px; font-weight:700; color:#fff; font-family:monospace; }
        #level-display { font-size:11px; color:#eab308; font-weight:700; margin-left:6px; }

        /* 마녀 게이지 – HUD 오른쪽 끝에 인라인 */
        #boss-bar-wrap {
            display: none;
            align-items: center;
            gap: 5px;
            margin-left: auto;
        }
        #boss-bar-label { font-size:10px; color:#f87171; font-weight:700; white-space:nowrap; }
        #boss-bar-track { width:70px; height:6px; background:rgba(0,0,0,0.5); border-radius:3px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); }
        #boss-bar-fill { height:100%; background:#ef4444; width:0%; transition:width 0.3s; }

        /* 버튼들 (뮤트, 리셋) */
        .hud-btns { display:flex; gap:5px; align-items:center; margin-left:auto; pointer-events:auto; }
        #boss-bar-wrap + .hud-btns { margin-left:8px; }
        .btn-ic { background:transparent; border:none; color:rgba(255,255,255,0.7); cursor:pointer; font-size:14px; padding:2px 4px; border-radius:5px; transition:background 0.15s; }
        .btn-ic:active { background:rgba(255,255,255,0.15); }

        /* ── 풀스크린 오버레이 (시작/종료/승리) ── */
        .ovl {
            position:absolute; inset:0;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:300; pointer-events:auto;
        }
        /* 반투명 카드 */
        .ovl-card {
            background: rgba(10,10,10,0.88);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            padding: 28px 32px;
            text-align: center;
            max-width: 300px;
            width: 85%;
            color: white;
            backdrop-filter: blur(6px);
        }
        .ovl-card h1 { font-size:20px; font-weight:900; margin-bottom:10px; line-height:1.3; }
        .ovl-card p  { font-size:13px; color:#aaa; margin-bottom:16px; line-height:1.5; }
        .btn-go { background:#eab308; color:#000; font-weight:900; padding:12px 0; border-radius:12px; border:none; font-size:15px; cursor:pointer; width:100%; margin-top:4px; transition:transform 0.1s; }
        .btn-go:active { transform:scale(0.96); }
        .btn-sec { background:rgba(255,255,255,0.1); color:white; font-weight:700; padding:10px 0; border-radius:10px; border:1px solid rgba(255,255,255,0.15); font-size:13px; cursor:pointer; width:100%; margin-top:8px; }
        .guide-row { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
        .g-item { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); padding:8px 10px; border-radius:10px; text-align:left; font-size:12px; }
        .g-item .ei { font-size:18px; }
        .g-item .lbl { color:#999; margin-top:2px; font-size:11px; }
        .badge { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:700; vertical-align:middle; margin-left:3px; }
        .br { background:#ef4444; color:#fff; }
        .bp { background:#a855f7; color:#fff; }
        .bg { background:#22c55e; color:#fff; }

        /* 게임오버 / 승리 compact */
        #go-score { font-size:28px; font-weight:900; font-family:monospace; color:#fff; margin:6px 0 14px; }
        #win-card { background:rgba(234,179,8,0.15); border-color:rgba(234,179,8,0.4); }
        #win-card h1 { color:#eab308; }

        /* BOSS 경고 */
        #boss-notice {
            position:absolute; top:50px; width:100%; text-align:center;
            color:#ff3b3b; font-size:18px; font-weight:900; letter-spacing:3px;
            visibility:hidden; z-index:210; pointer-events:none;
            animation: bn 0.5s infinite;
        }
        @keyframes bn { 0%,100%{opacity:0} 50%{opacity:1} }

        /* 조작 바 */
        #ctrl {
            display:none; position:absolute; bottom:0; left:50%;
            transform:translateX(-50%);
            height:54px; background:rgba(0,0,0,0.45);
            border-top:1px solid rgba(255,255,255,0.08);
            align-items:center; justify-content:center; z-index:200;
        }
        .track { width:80%; height:5px; background:#222; border-radius:10px; position:relative; }
        .knob  { position:absolute; top:-8px; width:18px; height:18px; background:#eab308; border-radius:50%; left:50%; transform:translateX(-50%); }
    </style>
</head>
<body>
<div id="gc">
    <canvas id="c"></canvas>

    <!-- HUD (한 줄) -->
    <div id="hud">
        <div class="hud-hearts" id="hearts"></div>
        <div class="hud-sep"></div>
        <span id="score-display">0</span>
        <span id="level-display">LV1.0</span>
        <div class="hud-sep"></div>
        <div id="boss-bar-wrap">
            <span id="boss-bar-label">마녀까지</span>
            <div id="boss-bar-track"><div id="boss-bar-fill"></div></div>
        </div>
        <div class="hud-btns">
            <button class="btn-ic" id="mute-btn">🔊</button>
            <button class="btn-ic" id="reset-btn">↺</button>
        </div>
    </div>

    <div id="boss-notice">⚠ BOSS INCOMING ⚠</div>

    <!-- 시작 화면 -->
    <div class="ovl" id="start-ovl">
        <div class="ovl-card">
            <h1>재홍 원사의<br><span style="color:#eab308;">군생활 위기 극복</span></h1>
            <p>법전·규정집을 날려 악성 민원과 갑질을 물리치세요!</p>
            <div class="guide-row">
                <div class="g-item"><span class="ei">👹</span><span class="badge br">공격</span><div class="lbl">맞히면 파괴</div></div>
                <div class="g-item"><span class="ei">⚠️</span><span class="badge bp">회피</span><div class="lbl">절대 피하기</div></div>
                <div class="g-item" style="grid-column:span 2;border-color:rgba(34,197,94,0.25);">
                    <span class="ei">✨</span><span class="badge bg">아이템</span>
                    <div class="lbl">💰상여금(무적) &nbsp; 🖼️가족(회복)</div>
                </div>
            </div>
            <button class="btn-go" id="start-btn">작전 개시</button>
        </div>
    </div>

    <!-- 게임오버 -->
    <div class="ovl" id="go-ovl" style="display:none;">
        <div class="ovl-card">
            <h1 style="color:#ff4444;">MISSION FAILED</h1>
            <div style="font-size:11px;color:#888;margin-top:4px;">최종 공헌도</div>
            <div id="go-score">0</div>
            <button class="btn-go" style="background:#ff4444;" id="retry-btn">재도전</button>
            <button class="btn-sec" id="home-btn">처음으로</button>
        </div>
    </div>

    <!-- 승리 -->
    <div class="ovl" id="win-ovl" style="display:none;">
        <div class="ovl-card" id="win-card">
            <div style="font-size:44px;margin-bottom:8px;">🏆</div>
            <h1>위기 극복 완료!</h1>
            <p>재홍 원사, 마녀를 물리쳤습니다!</p>
            <a class="btn-go" href="https://kjh1000j.github.io/hong-world" target="_blank" rel="noopener" style="display:block;text-decoration:none;">🏠 홍의 세계로</a>
            <button class="btn-sec" id="win-home-btn">처음으로</button>
        </div>
    </div>

    <!-- 조작 바 -->
    <div id="ctrl"><div class="track"><div class="knob" id="knob"></div></div></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const ctrl = document.getElementById('ctrl');
const knob = document.getElementById('knob');

let CW, CH;
const ASPECT = 9/16;
const PSIZE = 44;

function resize() {
    CW = window.innerWidth; CH = window.innerHeight;
    let cW = CW, cH = CW / ASPECT;
    if (cH > CH) { cH = CH; cW = CH * ASPECT; }
    canvas.width = cW; canvas.height = cH;
    canvas.style.width = cW + 'px'; canvas.style.height = cH + 'px';
    // HUD / ctrl 너비 동기
    hud.style.width = cW + 'px';
    ctrl.style.width = cW + 'px';
}
window.addEventListener('resize', resize);
resize();

/* ── Audio ── */
let AC = null, muted = false;
function sfx(type) {
    if (muted) return;
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    const t = AC.currentTime;
    ({
        shoot:  () => { o.type='square'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(110,t+.1); g.gain.setValueAtTime(.05,t); g.gain.exponentialRampToValueAtTime(.001,t+.1); o.start(); o.stop(t+.1); },
        hit:    () => { o.type='sawtooth'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(55,t+.2); g.gain.setValueAtTime(.05,t); g.gain.exponentialRampToValueAtTime(.001,t+.2); o.start(); o.stop(t+.2); },
        damage: () => { o.type='triangle'; o.frequency.setValueAtTime(110,t); o.frequency.linearRampToValueAtTime(55,t+.3); g.gain.setValueAtTime(.1,t); g.gain.linearRampToValueAtTime(.001,t+.3); o.start(); o.stop(t+.3); },
        item:   () => { o.type='sine'; o.frequency.setValueAtTime(523,t); o.frequency.exponentialRampToValueAtTime(1046,t+.3); g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.3); o.start(); o.stop(t+.3); },
    }[type] || (()=>{}))();
}

/* ── State ── */
let GS = 'START', score = 0, diff = 1, frame = 0, lastShot = 0;
let player, enemies, obstacles, projectiles, items, boss, scroll, shake, lastHp;

function reset() {
    score=0; diff=1; frame=0; lastShot=0; scroll=0; shake=0;
    player = { x:canvas.width/2, y:canvas.height-120, size:PSIZE, hp:3, tx:canvas.width/2, inv:0, aura:0, dash:0 };
    enemies=[]; obstacles=[]; projectiles=[]; items=[]; boss=null; lastHp=3;
    renderHUD();
    document.getElementById('boss-notice').style.visibility='hidden';
    document.getElementById('boss-bar-wrap').style.display='none';
}

/* ── HUD ── */
function renderHUD() {
    // 하트
    let h='';
    for(let i=0;i<3;i++) h+=`<span class="h${i>=player.hp?' lost':''}">❤️</span>`;
    document.getElementById('hearts').innerHTML = h;
    // 점수
    document.getElementById('score-display').textContent = Math.floor(score).toLocaleString();
    document.getElementById('level-display').textContent = 'LV'+diff.toFixed(1);
    // 마녀 게이지
    const bw = document.getElementById('boss-bar-wrap');
    if (GS==='PLAYING' && !boss) {
        bw.style.display='flex';
        document.getElementById('boss-bar-fill').style.width = Math.min(100,(score/5000)*100)+'%';
    } else if (boss) {
        bw.style.display='none';
    }
    if(lastHp!==player.hp) lastHp=player.hp;
}

/* ── Spawn ── */
function sp(base, arr, configs) { arr.push({...base, ...configs[Math.floor(Math.random()*configs.length)]}); }
function spawnEnemy() {
    const sc = canvas.height/800;
    const base = { id:Math.random(), x:30+Math.random()*(canvas.width-60), y:-50, size:40, speed:(1.8+Math.random()*1.8)*diff*sc, category:'enemy' };
    sp(base, enemies, [
        {emoji:'📞',label:'잦은 호출',hp:2},
        {emoji:'😤',label:'인사 갑질',hp:3},
        {emoji:'🔍',label:'감찰 조사',hp:2},
        {emoji:'💢',label:'악성 민원',hp:4},
    ]);
}
function spawnObs() {
    const sc = canvas.height/800;
    const base = { id:Math.random(), x:30+Math.random()*(canvas.width-60), y:-50, size:48, category:'obstacle' };
    sp(base, obstacles, [
        {emoji:'👴',label:'나때는말야',speed:2.8*diff*sc},
        {emoji:'🚘',label:'전관예우',  speed:5.5*diff*sc},
        {emoji:'❓',label:'원칙없는지시',speed:3.8*diff*sc},
        {emoji:'🤝',label:'듣보잡인맥',speed:4.5*diff*sc},
    ]);
}
function spawnItem() {
    const b = Math.random()<.5;
    items.push({ id:Math.random(), x:30+Math.random()*(canvas.width-60), y:-50, size:36, speed:2.8, category:'item', type:b?'Bonus':'Family', emoji:b?'💰':'🖼️', label:b?'상여금!':'가족응원!' });
}
function fire() {
    const now=Date.now(); if(now-lastShot<180) return; lastShot=now; sfx('shoot');
    const ib=Math.random()>.5;
    projectiles.push({ x:player.x, y:player.y-28, size:22, emoji:ib?'📖':'📜', label:ib?'법령':'법규', speed:13 });
}

/* ── Draw ── */
function drawRank(x,y) {
    ctx.save(); ctx.translate(x,y-28); ctx.scale(.65,.65);
    ctx.fillStyle='#FFD700'; ctx.font='16px serif'; ctx.textAlign='center'; ctx.fillText('★',0,-6);
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.lineJoin='round';
    for(let i=0;i<3;i++){const o=i*9;ctx.beginPath();ctx.moveTo(-12,-2+o);ctx.lineTo(0,7+o);ctx.lineTo(12,-2+o);ctx.stroke();}
    ctx.restore();
}

function drawEntity(e) {
    ctx.save();
    const b = Math.sin(Date.now()*.005)*4;
    const r = (Date.now()*.001)%(Math.PI*2);
    const [plate,shadow,border] = e.category==='enemy'
        ? ['rgba(220,0,0,.9)','#ff0000','#ffaaaa']
        : e.category==='obstacle'
        ? ['rgba(130,40,220,.9)','#c084fc','#e9d5ff']
        : ['rgba(245,200,20,.9)','#fef08a','#fefce8'];

    ctx.shadowBlur=18; ctx.shadowColor=shadow;
    // outer ring
    ctx.save(); ctx.shadowBlur=0; ctx.strokeStyle=border; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(e.x,e.y+b,e.size*.78,r,r+Math.PI*1.5); ctx.stroke(); ctx.restore();
    // body
    ctx.fillStyle=plate; ctx.beginPath(); ctx.arc(e.x,e.y+b,e.size*.62,0,Math.PI*2); ctx.fill();
    // emoji backing
    ctx.fillStyle='rgba(255,255,255,.88)'; ctx.beginPath(); ctx.arc(e.x,e.y+b-4,e.size*.42,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=border; ctx.lineWidth=3; ctx.stroke();
    // emoji
    ctx.font='bold '+(e.size*.75)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=6; ctx.shadowColor='rgba(0,0,0,.4)'; ctx.fillStyle='black';
    ctx.fillText(e.emoji,e.x,e.y+b-4);
    // label
    ctx.shadowBlur=0; ctx.font='800 12px sans-serif'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.strokeText(e.label,e.x,e.y+b+30);
    ctx.fillStyle='#fff'; ctx.fillText(e.label,e.x,e.y+b+30);
    ctx.restore();
}

/* ── Loop ── */
function showOvl(id) {
    ['start-ovl','go-ovl','win-ovl'].forEach(s=>{ const el=document.getElementById(s); if(el) el.style.display='none'; });
    hud.style.display='none'; ctrl.style.display='none';
    if(id){
        const el=document.getElementById(id); if(el) el.style.display='flex';
    } else {
        hud.style.display='flex'; ctrl.style.display='flex';
    }
}

function loop() {
    if(GS!=='PLAYING'&&GS!=='BOSS'){ requestAnimationFrame(loop); return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(shake>0){ ctx.save(); ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=.88; if(shake<.1)shake=0; }

    frame++; diff=1+frame/5000;
    score += .5*diff;
    fire();
    if(frame%4===0) renderHUD();

    // BG
    ctx.fillStyle='#3d4530'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1.5;
    scroll=(scroll+1.8*diff);
    for(let x=0;x<=canvas.width;x+=canvas.width/3){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
    ctx.fillStyle='rgba(0,0,0,.12)';
    for(let i=0;i<8;i++){ const y=(scroll*1.1+(i*145))%(canvas.height+100)-50; ctx.fillRect(35,y,16,8); ctx.fillRect(canvas.width-52,y,16,8); }

    // Player
    player.x+=(player.tx-player.x)*.15;
    if(player.inv>0)player.inv--;
    if(player.aura>0)player.aura--;
    if(player.dash>0)player.dash--;

    // Spawn
    const rate=Math.max(22,58-Math.floor(diff*5));
    if(frame%rate===0) spawnEnemy();
    if(frame%95===0) spawnObs();
    if(frame%580===0) spawnItem();

    // Boss trigger at 5000
    if(score>=5000&&!boss){
        boss={x:canvas.width/2,y:-80,size:68,hp:200,maxHp:200,atk:0,emoji:'🧛‍♀️'};
        GS='BOSS';
        const bn=document.getElementById('boss-notice'); bn.style.visibility='visible';
        setTimeout(()=>bn.style.visibility='hidden',2500);
    }

    // Projectiles
    for(let i=projectiles.length-1;i>=0;i--){
        const p=projectiles[i]; p.y-=p.speed;
        ctx.save();
        ctx.shadowBlur=15; ctx.shadowColor='#4ade80';
        ctx.fillStyle='rgba(255,255,255,.88)'; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*.45,0,Math.PI*2); ctx.fill();
        ctx.font='bold '+p.size+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowBlur=0;
        ctx.fillText(p.emoji,p.x,p.y);
        ctx.font='700 9px sans-serif'; ctx.fillStyle='white'; ctx.strokeStyle='black'; ctx.lineWidth=2;
        ctx.strokeText(p.label,p.x,p.y+16); ctx.fillText(p.label,p.x,p.y+16);
        ctx.restore();
        if(p.y<-40) projectiles.splice(i,1);
    }

    // Enemies
    for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i]; e.y+=e.speed; drawEntity(e);
        let dead=false;
        for(let pi=projectiles.length-1;pi>=0;pi--){
            const p=projectiles[pi];
            if(Math.hypot(e.x-p.x,e.y-p.y)<e.size/2+p.size/2){
                e.hp--; projectiles.splice(pi,1); sfx('hit');
                if(e.hp<=0){ enemies.splice(i,1); score+=150; dead=true; break; }
            }
        }
        if(dead) continue;
        if(player.inv===0&&Math.hypot(e.x-player.x,e.y-player.y)<e.size/2+player.size/2){
            if(player.dash>0){ enemies.splice(i,1); score+=200; sfx('hit'); }
            else{ player.hp--; player.inv=60; shake=12; sfx('damage'); renderHUD(); }
            continue;
        }
        if(e.y>canvas.height+40) enemies.splice(i,1);
    }

    // Obstacles
    for(let i=obstacles.length-1;i>=0;i--){
        const o=obstacles[i]; o.y+=o.speed; drawEntity(o);
        if(player.inv===0&&Math.hypot(o.x-player.x,o.y-player.y)<o.size/2+player.size/2){
            player.hp--; player.inv=60; shake=12; sfx('damage'); renderHUD();
        }
        if(o.y>canvas.height+40) obstacles.splice(i,1);
    }

    // Items
    for(let i=items.length-1;i>=0;i--){
        const it=items[i]; it.y+=it.speed; drawEntity(it);
        if(Math.hypot(it.x-player.x,it.y-player.y)<it.size/2+player.size/2){
            sfx('item');
            if(it.type==='Bonus'){ player.dash=300; player.inv=300; }
            else{ player.aura=300; player.inv=300; player.hp=Math.min(3,player.hp+1); }
            items.splice(i,1); score+=500; renderHUD();
        }
        if(it.y>canvas.height+40) items.splice(i,1);
    }

    // ── Boss ──
    if(boss){
        if(boss.y<90) boss.y+=2.5;
        else{
            boss.x=(canvas.width/2)+Math.sin(frame*.022)*(canvas.width*.32);
            boss.atk++;
            const sc=canvas.height/800;
            if(boss.atk>48/diff){
                boss.atk=0;
                const t=Math.random();
                if(t<.33) obstacles.push({id:Math.random(),x:boss.x,y:boss.y,size:52,speed:5.5*diff*sc,emoji:'✂️',label:'진급누락!',category:'obstacle'});
                else if(t<.66) obstacles.push({id:Math.random(),x:boss.x,y:boss.y,size:56,speed:7*diff*sc,emoji:'⛓️',label:'강제교류!',category:'obstacle'});
                else for(let k=-1;k<=1;k++) obstacles.push({id:Math.random(),x:boss.x+k*80,y:boss.y+Math.abs(k)*25,size:46,speed:4.5*diff*sc,emoji:'❌',label:'히스테리!',category:'obstacle'});
            }
        }
        // hits
        for(let pi=projectiles.length-1;pi>=0;pi--){
            const p=projectiles[pi];
            if(Math.hypot(boss.x-p.x,boss.y-p.y)<boss.size/2+p.size/2){
                boss.hp--; projectiles.splice(pi,1); sfx('hit');
                if(boss.hp<=0){ GS='ENDING'; showOvl('win-ovl'); return; }
            }
        }

        // Draw boss – 크기 축소, 라벨 작게
        const pulse=Math.sin(Date.now()*.01)*14;
        ctx.save(); ctx.shadowBlur=28+pulse; ctx.shadowColor='#ff00ff';
        ctx.fillStyle='rgba(130,40,200,.28)'; ctx.beginPath(); ctx.arc(boss.x,boss.y,boss.size*.65,0,Math.PI*2); ctx.fill(); ctx.restore();
        ctx.save();
        ctx.fillStyle='rgba(255,255,255,.9)'; ctx.beginPath(); ctx.arc(boss.x,boss.y,boss.size*.48,0,Math.PI*2); ctx.fill();
        ctx.font='bold '+boss.size+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(boss.emoji,boss.x,boss.y); ctx.restore();
        // 이름 라벨
        ctx.font='800 14px sans-serif'; ctx.textAlign='center';
        ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.strokeText('😈 열등감 가득한 인사 마녀 😈',boss.x,boss.y+boss.size/2+22);
        ctx.fillStyle='#ff9999'; ctx.fillText('😈 열등감 가득한 인사 마녀 😈',boss.x,boss.y+boss.size/2+22);
        // HP bar – 마녀 바로 위에, 캔버스 상단 아님
        const bx=boss.x-55, by=boss.y-boss.size/2-16, bw=110;
        ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(bx,by,bw,10);
        ctx.fillStyle='#ff3333'; ctx.fillRect(bx+1,by+1,(bw-2)*(boss.hp/boss.maxHp),8);
        ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,10);
    }

    // ── Player draw ──
    if(!(player.inv>0&&Math.floor(player.inv/5)%2===0)){
        ctx.save();
        // shadow
        ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(player.x,player.y+player.size/2.3,player.size/1.7,player.size/4.2,0,0,Math.PI*2); ctx.fill();
        // aura
        if(player.aura>0){ ctx.save(); ctx.shadowBlur=22; ctx.shadowColor='gold'; ctx.fillStyle='rgba(255,215,0,.35)'; ctx.beginPath(); ctx.arc(player.x,player.y,player.size*.88,0,Math.PI*2); ctx.fill(); ctx.restore(); }
        // body
        ctx.fillStyle=player.dash>0?'#facc15':'#5a8a0a';
        ctx.shadowBlur=8; ctx.shadowColor='rgba(0,0,0,.4)';
        ctx.beginPath(); ctx.arc(player.x,player.y,player.size/2,0,Math.PI*2); ctx.fill();
        // shine
        ctx.fillStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.arc(player.x-player.size/6,player.y-player.size/6,player.size/6,0,Math.PI*2); ctx.fill();
        // face
        ctx.fillStyle='#fef3c7'; ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(player.x,player.y+1,player.size/3.6,0,Math.PI*2); ctx.fill();
        // cap
        ctx.fillStyle='#1a2e05'; ctx.beginPath(); ctx.arc(player.x,player.y-player.size/5.5,player.size/2.4,Math.PI,0); ctx.fill();
        ctx.fillRect(player.x-player.size/2.4,player.y-player.size/5.5,player.size/1.2,1.5);
        // eyes
        ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(player.x-3,player.y+1,1.6,0,Math.PI*2); ctx.arc(player.x+3,player.y+1,1.6,0,Math.PI*2); ctx.fill();
        // name
        ctx.font='800 11px sans-serif'; ctx.textAlign='center';
        ctx.strokeStyle='rgba(0,0,0,.9)'; ctx.lineWidth=3.5; ctx.strokeText('재홍',player.x,player.y+22);
        ctx.fillStyle='white'; ctx.fillText('재홍',player.x,player.y+22);
        ctx.restore();
        drawRank(player.x,player.y);
    }

    if(player.hp<=0){ GS='GAME_OVER'; document.getElementById('go-score').textContent=Math.floor(score).toLocaleString(); showOvl('go-ovl'); }
    if(shake>0) ctx.restore();
    requestAnimationFrame(loop);
}

/* ── Input ── */
function inp(cx){
    if(GS!=='PLAYING'&&GS!=='BOSS') return;
    const rect=canvas.getBoundingClientRect();
    const sc=canvas.width/rect.width;
    let x=(cx-rect.left)*sc;
    player.tx=Math.max(PSIZE/2,Math.min(canvas.width-PSIZE/2,x));
    knob.style.left=(player.tx/canvas.width)*100+'%';
}
canvas.addEventListener('mousemove',e=>inp(e.clientX));
canvas.addEventListener('mousedown',e=>inp(e.clientX));
canvas.addEventListener('touchmove',e=>{e.preventDefault();inp(e.touches[0].clientX);},{passive:false});
canvas.addEventListener('touchstart',e=>inp(e.touches[0].clientX),{passive:false});

/* ── Buttons ── */
function goStart(){ GS='START'; showOvl('start-ovl'); }
document.getElementById('start-btn').onclick = ()=>{ reset(); GS='PLAYING'; showOvl(null); };
document.getElementById('retry-btn').onclick = ()=>{ reset(); GS='PLAYING'; showOvl(null); };
document.getElementById('home-btn').onclick  = goStart;
document.getElementById('win-home-btn').onclick = goStart;
document.getElementById('reset-btn').onclick = goStart;
document.getElementById('mute-btn').onclick  = function(){ muted=!muted; this.textContent=muted?'🔇':'🔊'; };

loop();
</script>
</body>
</html>
